<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Credencial Digital — Santo Tomás</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',Arial,sans-serif;padding:20px}
.card{background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.35);max-width:360px;width:100%;animation:su .4s ease}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.hdr{background:#1a1a2e;padding:30px 24px 40px;text-align:center;position:relative}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:#fff;border-radius:20px 20px 0 0}
.cn{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.5px;text-transform:uppercase;margin-bottom:20px}
.av{width:96px;height:96px;border-radius:50%;border:4px solid rgba(255,255,255,.25);overflow:hidden;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;color:#fff;position:relative;z-index:1;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:28px 24px 20px;text-align:center}
.name{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:5px;line-height:1.25}
.role{font-size:13px;color:#555;margin-bottom:14px;line-height:1.4;font-style:italic}
.dept{display:inline-block;background:#1a1a2e;color:#fff;font-size:10px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:18px;letter-spacing:.3px;text-transform:uppercase}
.div{height:1px;background:#f0f0f0;margin-bottom:16px}
.ir{display:flex;align-items:center;gap:10px;font-size:13px;color:#444;margin-bottom:10px;text-align:left}
.lbl{font-size:10px;color:#aaa;min-width:50px;text-align:right;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.iv{word-break:break-all}
.idb{font-family:monospace;background:#f0f0f0;padding:3px 10px;border-radius:6px;font-size:13px;font-weight:600;color:#333}
.ft{background:#1a1a2e;padding:12px 20px;text-align:center;font-size:9px;color:rgba(255,255,255,.65);letter-spacing:.5px;text-transform:uppercase}
.msg{padding:50px 30px;text-align:center;font-size:14px;color:#666;line-height:2}
.icon{font-size:32px;display:block;margin-bottom:12px}
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:6px;height:14px;margin:6px auto}
@keyframes sk{from{background-position:200% 0}to{background-position:-200% 0}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="msg">
    <span class="icon">🔄</span>
    <div class="skel" style="width:60%"></div>
    <div class="skel" style="width:40%"></div>
    <div class="skel" style="width:70%"></div>
  </div>
</div>
<script>
// ════════════════════════════════════════════════════
// CONFIGURACIÓN — URL del Google Sheet ya configurada
// Si cambias de planilla, reemplaza solo CSV_URL
// ════════════════════════════════════════════════════
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?output=csv';
const EMPRESA = 'Santo Tomás';
const FOOTER  = 'Identificación interna — No transferible';
// ════════════════════════════════════════════════════

function qp(p){return new URLSearchParams(location.search).get(p);}
function ini(n){return(n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}
const PAL=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#0ea5e9','#14b8a6'];
function cidx(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffff;return PAL[h%PAL.length];}

function parseCSV(txt){
  txt=txt.replace(/^\uFEFF/,'');
  const lines=txt.split(/\r?\n/).filter(l=>l.trim());
  const pr=line=>{
    const f=[];let cur='',q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
      else if(c===','&&!q){f.push(cur.trim());cur='';}
      else cur+=c;
    }
    f.push(cur.trim());
    return f;
  };
  const hdrs=pr(lines[0]).map(h=>h.replace(/"/g,'').trim().toLowerCase());
  const rows=lines.slice(1).map(l=>{
    const v=pr(l);
    return Object.fromEntries(hdrs.map((h,i)=>[h,(v[i]||'').replace(/"/g,'').trim()]));
  });
  return{hdrs,rows};
}

function fc(hdrs,cands){
  for(const c of cands){const h=hdrs.find(h=>h.includes(c));if(h)return h;}
  return null;
}

async function load(){
  const id=qp('id');
  if(!id){showErr('No se especificó ID','Agrega <b>?id=5</b> al final de la URL','🔍');return;}
  try{
    let txt='';
    try{
      const r=await fetch(CSV_URL,{cache:'no-store'});
      if(!r.ok)throw new Error('HTTP '+r.status);
      txt=await r.text();
    }catch(fe){
      // Fallback via proxy if CORS fails
      const rp=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(CSV_URL));
      if(!rp.ok)throw new Error('No se pudo cargar el CSV ('+fe.message+')');
      txt=(await rp.json()).contents;
    }
    const{hdrs,rows}=parseCSV(txt);
    const emp=rows.find(r=>Object.values(r).some(v=>String(v).trim()===String(id).trim()));
    if(!emp){showErr('Empleado no encontrado','El ID <b>'+id+'</b> no existe en la planilla.','🔍');return;}
    const g=cs=>{const c=fc(hdrs,cs);return c?emp[c]:'';}
    const nombre=g(['nombre','name','trabajador','empleado']);
    const cargo=g(['cargo','puesto','position','title','rol']);
    const dept=g(['departamento','depart','area','área','division','piso','sector']);
    const email=g(['email','mail','correo']);
    const foto=g(['foto_url','foto','photo','imagen','picture','avatar']);
    const col=cidx(id);
    const iniStr=ini(nombre);
    const av=(foto&&foto.startsWith('http'))
      ?`<img src="${foto}" alt="${nombre}" onerror="this.outerHTML='${iniStr}'">`
      :iniStr;
    document.getElementById('card').innerHTML=
      `<div class="hdr"><div class="cn">${EMPRESA}</div><div class="av" style="background:${col}">${av}</div></div>`+
      `<div class="body">`+
      `<div class="name">${nombre}</div>`+
      `<div class="role">${cargo}</div>`+
      (dept?`<div class="dept">${dept}</div>`:'')+
      `<div class="div"></div>`+
      `<div class="ir"><span class="lbl">ID</span><span class="idb">${id}</span></div>`+
      (email?`<div class="ir"><span class="lbl">Email</span><span class="iv">${email}</span></div>`:'')+
      `</div>`+
      `<div class="ft">${FOOTER}</div>`;
  }catch(e){
    showErr('Error al cargar',e.message+'<br><small>¿El CSV está publicado como público?</small>','⚠️');
    console.error(e);
  }
}
function showErr(t,d,ic){
  document.getElementById('card').innerHTML=
    `<div class="msg"><span class="icon">${ic||'⚠️'}</span>`+
    `<strong style="display:block;margin-bottom:8px;color:#333;font-size:15px">${t}</strong>`+
    `<span style="font-size:13px;color:#888">${d}</span></div>`;
}
load();
</script>
</body>
</html>
