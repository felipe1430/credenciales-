<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Credencial Digital — Mi Empresa S.A.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0f2ff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',Arial,sans-serif;padding:20px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:360px;width:100%}
.hdr{background:#1a1a2e;padding:28px 24px 36px;text-align:center}
.co{font-size:14px;font-weight:700;color:#ffffff;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:8px}
.logo{height:26px;object-fit:contain}
.av{width:90px;height:90px;border-radius:50%;border:4px solid rgba(255,255,255,.3);overflow:hidden;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:24px;text-align:center}
.name{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px;line-height:1.2}
.role{font-size:14px;color:#666;margin-bottom:12px;line-height:1.3}
.dept{display:inline-block;background:#1a1a2e;color:#ffffff;font-size:11px;padding:4px 14px;border-radius:20px;margin-bottom:16px}
.info{border-top:1px solid #f0f0f0;padding-top:16px;display:flex;flex-direction:column;gap:10px}
.ir{display:flex;align-items:center;gap:10px;font-size:13px;color:#444;text-align:left}
.lbl{font-size:11px;color:#999;min-width:55px;text-align:right;flex-shrink:0}
.idb{font-family:monospace;background:#f5f5f5;padding:3px 10px;border-radius:6px;font-size:12px}
.ft{background:#1a1a2e;padding:12px;text-align:center;font-size:10px;color:#ffffff}
.msg{padding:40px;text-align:center;font-size:14px;color:#666;line-height:1.8}
</style></head>
<body>
<div class="card" id="card"><div class="msg">🔄 Cargando credencial…</div></div>
<script>
// ================================================================
// CONFIGURACIÓN — edita SOLO la siguiente línea con tu URL de CSV:
// ================================================================
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?output=csv';
// Pasos:
// 1. Abre tu Google Sheet
// 2. Archivo → Publicar en la web → selecciona la hoja → formato CSV → Publicar
// 3. Copia la URL que aparece y reemplaza PEGAR_AQUI_LA_URL_DEL_CSV arriba
// ================================================================
const EMPRESA = 'Mi Empresa S.A.';
const LOGO_URL = '';
const FOOTER = 'Identificación interna — No transferible';
const C1 = '#1a1a2e';

function qp(p){return new URLSearchParams(location.search).get(p);}
function ini(n){return(n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}
const ACOLS=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444'];
function acol(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xffff;return ACOLS[h%ACOLS.length];}

async function load(){
  const id = qp('id');
  if(!id){ err('No se especificó ID de empleado.<br><small>Añade <b>?id=5</b> al final de la URL</small>'); return; }
  // Only block if truly placeholder (not configured)
  if(!CSV_URL || CSV_URL === 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?output=csv'){
    err('Falta configurar la URL del CSV.<br><small>Edita este archivo y reemplaza <b>CSV_URL</b> con tu URL de Google Sheets</small>');
    return;
  }
  try{
    const r = await fetch(CSV_URL);
    if(!r.ok) throw new Error('HTTP ' + r.status + ' — verifica que el CSV esté publicado como público');
    const txt = await r.text();
    const lines = txt.split('\n').filter(l => l.trim());
    const parseRow = l => {
      const f=[];let cur='',q=false;
      for(const c of l){
        if(c==='"'){q=!q;}
        else if(c===','&&!q){f.push(cur.trim());cur='';}
        else cur+=c;
      }
      f.push(cur.trim());
      return f;
    };
    const hdrs = parseRow(lines[0]).map(h => h.replace(/"/g,'').trim());
    const rows = lines.slice(1).map(l => {
      const v = parseRow(l);
      return Object.fromEntries(hdrs.map((h,i) => [h, (v[i]||'').replace(/"/g,'').trim()]));
    });
    // Search by any column matching the ID (handles numeric and string IDs)
    const emp = rows.find(r => hdrs.some(h => String(r[h]).trim() === String(id).trim()));
    if(!emp){ err('Empleado no encontrado: <b>' + id + '</b><br><small>Verifica que el ID exista en tu Google Sheet</small>'); return; }
    const g = cs => emp[hdrs.find(h => cs.some(c => h.toLowerCase().includes(c)))] || '';
    const nombre = g(['nombre','name','trabajador']);
    const cargo  = g(['cargo','puesto','position','title','rol']);
    const dept   = g(['depart','area','área','division','piso','sector']);
    const email  = g(['email','mail','correo']);
    const foto   = g(['foto','photo','imagen','picture','avatar']);
    const col = acol(id);
    const logoHTML = LOGO_URL && LOGO_URL.startsWith('http')
      ? '<img src="'+LOGO_URL+'" style="height:26px;object-fit:contain" onerror="this.style.display=\'none\'">' : '';
    document.getElementById('card').innerHTML =
      '<div class="hdr">'
      +'<div class="co">'+logoHTML+'<span>'+EMPRESA+'</span></div>'
      +'<div class="av" style="background:'+col+'">'
        +(foto&&foto.startsWith('http')
          ? '<img src="'+foto+'" alt="'+nombre+'" onerror="this.outerHTML=\''+ini(nombre)+'\'">':ini(nombre))
      +'</div></div>'
      +'<div class="body">'
      +'<div class="name">'+nombre+'</div>'
      +'<div class="role">'+cargo+'</div>'
      +(dept?'<div class="dept">'+dept+'</div>':'')
      +'<div class="info">'
      +'<div class="ir"><span class="lbl">ID</span><span class="idb">'+id+'</span></div>'
      +(email?'<div class="ir"><span class="lbl">Email</span><span style="word-break:break-all">'+email+'</span></div>':'')
      +'</div></div>'
      +'<div class="ft">'+FOOTER+'</div>';
  }catch(e){ err('Error al cargar datos: ' + e.message); }
}
function err(m){ document.getElementById('card').innerHTML = '<div class="msg">⚠️ ' + m + '</div>'; }
load();
</script>
</body></html>
