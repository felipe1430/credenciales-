<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Felipe Nicolás Martinez Hernandez — Mi Empresa S.A.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0f2ff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',Arial,sans-serif;padding:20px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:360px;width:100%}
.hdr{background:#1b4332;padding:28px 24px 36px;text-align:center}
.co{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
.co span{font-size:14px;font-weight:700;color:#ffffff}
.logo{height:28px;object-fit:contain}
.av{width:90px;height:90px;border-radius:50%;border:4px solid rgba(255,255,255,.3);overflow:hidden;margin:0 auto;background:#10b981;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:24px;text-align:center}
.name{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.role{font-size:14px;color:#666;margin-bottom:12px}
.dept{display:inline-block;background:#1b4332;color:#ffffff;font-size:11px;padding:4px 14px;border-radius:20px;font-weight:600;margin-bottom:16px}
.info{border-top:1px solid #f0f0f0;padding-top:16px;display:flex;flex-direction:column;gap:10px}
.ir{display:flex;align-items:center;gap:10px;font-size:13px;color:#444;text-align:left}
.lbl{font-size:11px;color:#999;min-width:60px;text-align:right;flex-shrink:0}
.idb{font-family:monospace;font-size:12px;background:#f5f5f5;padding:3px 10px;border-radius:6px}
.ft{background:#1b4332;padding:12px 24px;text-align:center;font-size:10px;color:#ffffff;opacity:.8}
@media print{body{background:#fff}.card{box-shadow:none}}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div class="co">
      <span>Mi Empresa S.A.</span></div>
    <div class="av"><img src="https://raw.githubusercontent.com/felipe1430/credenciales-/refs/heads/main/fotos/felipe%20martinez.jpeg" alt="Felipe Nicolás Martinez Hernandez" onerror="this.outerHTML='FN'"></div>
  </div>
  <div class="body">
    <div class="name">Felipe Nicolás Martinez Hernandez</div>
    <div class="role">JEFE DE INFORMATICA</div>
    <div class="dept">3° PISO OFICINA INFORMATICA</div>
    <div class="info">
      <div class="ir"><span class="lbl">ID</span><span class="idb">5</span></div>
      <div class="ir"><span class="lbl">Email</span><span>fmartinez16@santotomas.cl</span></div>
    </div>
  </div>
  <div class="ft">Identificación interna — No transferible</div>
</div>
</body></html>
