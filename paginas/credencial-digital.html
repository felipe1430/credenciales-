<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Credencial Digital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0f2ff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',Arial,sans-serif;padding:20px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:360px;width:100%}
.hdr{background:#1b4332;padding:28px 24px 36px;text-align:center}
.co{font-size:14px;font-weight:700;color:#ffffff;margin-bottom:20px}
.av{width:90px;height:90px;border-radius:50%;border:4px solid rgba(255,255,255,.3);overflow:hidden;margin:0 auto;background:#666;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:24px;text-align:center}
.name{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.role{font-size:14px;color:#666;margin-bottom:12px}
.dept{display:inline-block;background:#1b4332;color:#ffffff;font-size:11px;padding:4px 14px;border-radius:20px;margin-bottom:16px}
.info{border-top:1px solid #f0f0f0;padding-top:16px;display:flex;flex-direction:column;gap:10px}
.ir{display:flex;align-items:center;gap:10px;font-size:13px;color:#444}
.lbl{font-size:11px;color:#999;min-width:60px;text-align:right;flex-shrink:0}
.idb{font-family:monospace;background:#f5f5f5;padding:3px 10px;border-radius:6px;font-size:12px}
.ft{background:#1b4332;padding:12px;text-align:center;font-size:10px;color:#ffffff}
.loading{color:#666;font-size:14px;padding:40px;text-align:center}
.err{color:#e74c3c;font-size:13px;padding:30px;text-align:center;line-height:1.8}
</style>
</head>
<body>
<div class="card" id="card"><div class="loading">🔄 Cargando credencial…</div></div>
<script>
// ⚠️ PASO 1: Reemplaza esta URL con tu Google Sheet publicado como CSV
// Archivo → Publicar en la web → Formato CSV → Copiar enlace
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?output=csv';
const EMPRESA = 'Mi Empresa S.A.';

function qp(p){return new URLSearchParams(location.search).get(p);}
function ini(n){return(n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}

async function load(){
  const id=qp('id');
  if(!id){showErr('No se especificó un ID.<br><small>Usa <b>?id=EMP-001</b> al final de la URL</small>');return;}
  if(CSV_URL==='https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?output=csv'){showErr('Falta configurar la URL del CSV.<br><small>Abre este archivo HTML y edita la variable <b>CSV_URL</b></small>');return;}
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const lines=text.split('\n').filter(l=>l.trim());
    const parse=l=>{const r=[];let f='',q=false;for(const c of l){if(c==='"')q=!q;else if(c===','&&!q){r.push(f.trim());f='';}else f+=c;}r.push(f.trim());return r;};
    const hdrs=parse(lines[0]).map(h=>h.replace(/^"|"$/g,''));
    const rows=lines.slice(1).map(l=>Object.fromEntries(hdrs.map((h,i)=>[h,(parse(l)[i]||'').replace(/^"|"$/g,'')])));
    const emp=rows.find(r=>Object.values(r).some(v=>String(v).trim()===String(id).trim()));
    if(!emp){showErr('Empleado no encontrado: <b>'+id+'</b>');return;}
    const get=cs=>emp[hdrs.find(h=>cs.some(c=>h.toLowerCase().includes(c)))]||'';
    const nombre=get(['nombre','name']);const cargo=get(['cargo','puesto','position']);
    const dept=get(['depart','area','área']);const email=get(['email','mail','correo']);
    const foto=get(['foto','photo','imagen','url']);
    const ac=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444'];
    const col=ac[Math.abs(id.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%ac.length];
    document.getElementById('card').innerHTML=`
      <div class="hdr"><div class="co">${EMPRESA}</div>
        <div class="av" style="background:${col}">${foto?'<img src="'+foto+'" onerror="this.outerHTML=\''+ini(nombre)+'\'">':ini(nombre)}</div>
      </div>
      <div class="body">
        <div class="name">${nombre}</div><div class="role">${cargo}</div>
        ${dept?'<div class="dept">'+dept+'</div>':''}
        <div class="info">
          <div class="ir"><span class="lbl">ID</span><span class="idb">${id}</span></div>
          ${email?'<div class="ir"><span class="lbl">Email</span><span>'+email+'</span></div>':''}
        </div>
      </div>
      <div class="ft">${EMPRESA} — Identificación interna</div>`;
  }catch(e){showErr('Error: '+e.message);}
}
function showErr(m){document.getElementById('card').innerHTML='<div class="err">⚠️ '+m+'</div>';}
load();
</script>
</body></html>
